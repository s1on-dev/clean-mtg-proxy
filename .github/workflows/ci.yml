name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: |
          bash -n install.sh
          bash -n tests/extract_mtgctl.sh
          bash -n tests/test_install.sh

      - name: Embedded mtgctl syntax and ShellCheck
        run: |
          bash tests/extract_mtgctl.sh > /tmp/mtgctl
          bash -n /tmp/mtgctl

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: |
          shellcheck install.sh tests/extract_mtgctl.sh tests/test_install.sh
          shellcheck /tmp/mtgctl

      - name: Installer regression tests
        run: bash tests/test_install.sh
